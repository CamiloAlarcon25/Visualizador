<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Visualizador Cerebro 4D</title>
  <style>
    body {
      margin: 0;
      background-color: lightblue; /* Fondo celeste */
      font-family: Arial, sans-serif;
    }
    #mensaje {
      position: absolute;
      top: 20px;
      left: 20px;
      color: darkblue;
      font-size: 24px;
      font-weight: bold;
      z-index: 10;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="mensaje">¡Hola Mundo! Probando visualizador 3D</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/controls/OrbitControls.js"></script>

  <script>
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1, 3);

    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Controles para mover la cámara
    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    // Luces más potentes
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    // Cargar el modelo GLB
    const loader = new THREE.GLTFLoader();
    loader.load('cubo.glb', function(gltf) {
      const model = gltf.scene;
      model.scale.set(1, 1, 1); // Ajusta tamaño
      model.position.set(0, 0, 0); // Centrado
      scene.add(model);
      console.log("Modelo cargado correctamente");
    }, undefined, function(error) {
      console.error("Error al cargar el modelo:", error);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
