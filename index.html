<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Visualizador Cerebro 3D</title>
  <style>
    body {
      margin: 0;
      background-color: lightblue; /* Fondo celeste claro */
      font-family: Arial, sans-serif;
    }
    #mensaje {
      position: absolute;
      top: 20px;
      left: 20px;
      color: darkblue;
      font-size: 24px;
      font-weight: bold;
      z-index: 10; /* Para que quede encima del canvas */
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <!-- Texto de prueba -->
  <div id="mensaje">¡Hola Mundo! Probando visualizador 3D</div>

  <!-- Incluimos Three.js y el cargador GLTF -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    // Crear la escena
    const scene = new THREE.Scene();

    // Cámara
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 3;

    // Renderizador
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Luz
    const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
    scene.add(light);

    // Cargar el modelo GLB
    const loader = new THREE.GLTFLoader();
    loader.load('cerebro3.glb', function(gltf) {
      scene.add(gltf.scene);
    }, undefined, function(error) {
      console.error(error);
    });

    // Animación 
    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    // Ajustar al tamaño de la ventana
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
