<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - Cerebro</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        /* Contenedor del modelo 3D */
        model-viewer {
            width: 80vw;
            height: 60vh;
            max-width: 800px;
            max-height: 600px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <h1>Imagen de Cerebro</h1>

    <model-viewer 
        src="cerebro.glb" 
        alt="Un modelo 3D de un cerebro" 
        auto-rotate 
        camera-controls>
    </model-viewer>

</body>
</html>
